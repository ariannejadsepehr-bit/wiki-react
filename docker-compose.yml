version: '3.8'

services:
  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: wikibehtarin-db
    environment:
      POSTGRES_DB: wikibehtarin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: wikibehtarin-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # NestJS API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wikibehtarin-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/wikibehtarin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: change-this-in-production
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Next.js Frontend
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wikibehtarin-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: wikibehtarin-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api

volumes:
  postgres_data:
  redis_data:
